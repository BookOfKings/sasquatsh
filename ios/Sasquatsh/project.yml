name: Sasquatsh
options:
  bundleIdPrefix: com.sasquatsh
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "2"
    INFOPLIST_KEY_CFBundleDisplayName: Sasquatsh
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.board-games"

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  google-sign-in-ios:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

targets:
  Sasquatsh:
    type: application
    platform: iOS
    sources:
      - path: .
        createIntermediateGroups: true
        excludes:
          - project.yml
          - "*.xcodeproj"
          - "*.xcworkspace"
          - build
          - SasquatshUITests
    entitlements:
      path: Sasquatsh.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.sasquatsh.ios
        aps-environment: production
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sasquatsh.ios
        CODE_SIGN_ENTITLEMENTS: Sasquatsh.entitlements
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: "6QFGMUQY98"
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseCore
      - package: firebase-ios-sdk
        product: FirebaseMessaging
      - package: google-sign-in-ios
        product: GoogleSignIn
      - package: google-sign-in-ios
        product: GoogleSignInSwift
    info:
      path: Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.313358569933-dimgosjcmgo7fimhi56trekhu0jdm6sf
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Sasquatsh uses the camera to scan board game barcodes and add them to your collection."
        NSPhotoLibraryUsageDescription: "Sasquatsh uses your photo library to scan board game shelves and add games to your collection."
        NSCalendarsWriteOnlyAccessUsageDescription: "Sasquatsh would like to add game events to your calendar."
        NSUserNotificationsUsageDescription: "Sasquatsh sends notifications for game event updates, chat messages, and planning session activity."
        UIApplicationSupportsIndirectInputEvents: true
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - Inter-Bold.ttf

  SasquatshUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SasquatshUITests
    dependencies:
      - target: Sasquatsh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sasquatsh.ios.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Sasquatsh
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @loader_path/Frameworks"
