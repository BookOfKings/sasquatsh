  <text x="300" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="rgba(255,255,255,0.85)">Advertise on Sasquatsh.</text>
  <!-- CTA -->
  <rect x="225" y="150" width="150" height="32" rx="16" fill="white"/>
  <text x="300" y="171" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#2D5A3D">Learn More</text>
